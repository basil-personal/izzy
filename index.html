            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

                if (!isSuccessful) {
                    // Shake the window on wrong password
                    const win = document.querySelector('.aim-window');
                    win.classList.add('shake');
                    setTimeout(() => win.classList.remove('shake'), 500);

                    // Update status bar with error
                    document.querySelector('.aim-statusbar').innerHTML =
                        '<span style="color:#FF1493;">&#x274C; wRoNg PaSsWoRd!! tRy AgAiN bAbE</span>';
                }
            });
        </script>
    </body>
</html>
