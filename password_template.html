            }

            .staticrypt-content {

                align-items: center;
                justify-content: center;

                    radial-gradient(ellipse at 50% 80%, rgba(155,89,182,0.2) 0%, transparent 50%),

                position: relative;
            }

            /* Floating emoji background */
            .staticrypt-content::before {
                content: '';
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                background-image:
                    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'><text y='28' font-size='24' opacity='0.12'>%E2%9C%A8</text></svg>"),

                background-size: 80px 80px, 120px 120px;
                animation: bgFloat 15s ease-in-out infinite;
                pointer-events: none;
            }

            @keyframes bgFloat {
                0%, 100% { background-position: 0 0, 60px 60px; }
                50% { background-position: 40px 20px, 20px 80px; }
            }

            /* AIM Window */
            .aim-window {
                background: #C0C0C0;
                border: 2px solid #808080;
                border-top-color: #fff;
                border-left-color: #fff;
                box-shadow: 4px 4px 0 rgba(0,0,0,0.3), inset 1px 1px 0 #fff;
                width: 90%;
                max-width: 360px;
                position: relative;
                z-index: 10;
            }

            .aim-titlebar {
                background: linear-gradient(180deg, #0058A8, #003C7A);
                color: white;
                font-family: 'VT323', monospace;
                font-size: 14px;
                padding: 4px 8px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                cursor: default;
                user-select: none;
            }

            .aim-titlebar-buttons {
                display: flex;
                gap: 2px;
            }

            .aim-btn-fake {
                width: 16px;
                height: 14px;
                background: #C0C0C0;
                border: 1px outset #fff;
                font-size: 9px;
                line-height: 12px;
                text-align: center;
                font-family: monospace;
            }

            .aim-body {
                background: white;
                padding: 24px 20px;
                text-align: center;
            }

            .aim-buddy-icon {
                width: 70px;
                height: 70px;
                margin: 0 auto 14px;
                background: linear-gradient(135deg, #FF69B4, #9B59B6);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 34px;
                border: 3px solid #FF1493;
                box-shadow: 0 0 20px rgba(255,20,147,0.5);
                animation: pulse 2s ease-in-out infinite;
            }

            @keyframes pulse {
                0%, 100% { box-shadow: 0 0 20px rgba(255,20,147,0.5); transform: scale(1); }
                50% { box-shadow: 0 0 35px rgba(255,20,147,0.8); transform: scale(1.05); }
            }

            .aim-title {
                font-family: 'Press Start 2P', monospace;
                font-size: 10px;
                color: #FF1493;
                margin-bottom: 4px;
                line-height: 1.6;
            }

            .aim-bride-name {
                font-family: 'Press Start 2P', monospace;
                font-size: 24px;
                background: linear-gradient(90deg, #FF1493, #9B59B6, #FF69B4, #00CED1);
                background-size: 300% 300%;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                animation: gradientShift 3s ease infinite;
                margin-bottom: 6px;
            }

            @keyframes gradientShift {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }

            .aim-subtitle {
                font-size: 17px;
                color: #9B59B6;
                font-weight: 700;
                margin-bottom: 16px;
            }

            .away-message {
                background: #FFFFCC;
                border: 1px solid #ccc;
                padding: 10px;
                font-style: italic;
                font-size: 13px;
                color: #555;
                margin-bottom: 16px;
                text-align: left;
                line-height: 1.5;
            }

            .away-label {
                font-weight: 700;
                color: #0000FF;
                font-style: normal;
                font-size: 11px;
                font-family: 'VT323', monospace;
            }

            /* Password input */
            .staticrypt-password-container {
                position: relative;
                background: #f2f2f2;
                border: 2px inset #ccc;
                margin: 0 0 12px;
            }

            .staticrypt-password-container input[type="password"],
            .staticrypt-password-container input[type="text"] {
                width: 100%;
                padding: 12px 36px 12px 12px;
                border: none;
                outline: none;
                font-family: 'Comic Neue', cursive;
                font-size: 16px;
                background: transparent;
                box-sizing: border-box;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                opacity: 0.5;
                padding: 12px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
            }

            /* Submit button */
            .staticrypt-decrypt-button {
                background: linear-gradient(180deg, #FF69B4, #FF1493);
                color: white;
                border: 2px outset #FF69B4;
                padding: 12px 24px;
                font-family: 'Press Start 2P', monospace;
                font-size: 10px;
                cursor: pointer;
                text-transform: uppercase;
                letter-spacing: 1px;
                width: 100%;
                transition: all 0.1s;
            }

            .staticrypt-decrypt-button:active {
                border-style: inset;
                transform: translate(1px, 1px);
            }

            .staticrypt-decrypt-button:hover {
                filter: brightness(1.1);
            }

            /* Remember me */
            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 12px;
                font-family: 'VT323', monospace;
                font-size: 16px;
                color: #555;
                cursor: pointer;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                margin-right: 8px;
                accent-color: #FF1493;
            }

            /* Status bar */
            .aim-statusbar {
                background: #C0C0C0;
                border-top: 1px solid #808080;
                padding: 4px 8px;
                font-family: 'VT323', monospace;
                font-size: 12px;
                color: #555;
                text-align: center;
            }

            .blink { animation: blink 1s step-end infinite; }
            @keyframes blink { 50% { opacity: 0; } }

            /* Error shake */
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20%, 60% { transform: translateX(-6px); }
                40%, 80% { transform: translateX(6px); }
            }
            .shake { animation: shake 0.4s ease; }

            .hidden { display: none !important; }

            /* Loading spinner */
            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #FF1493, #9B59B6);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 3px solid rgba(255,255,255,0.3);
                border-top-color: #FFFF00;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            .loading-label {
                font-family: 'VT323', monospace;
                color: white;
                font-size: 18px;
                margin-top: 14px;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            /* Butterfly divider */
            .butterfly-divider {
                text-align: center;
                padding: 6px 0;
                font-size: 14px;
                letter-spacing: 8px;
                opacity: 0.5;
                margin: 2px 0 10px;
            }

            /* Responsive */
            @media (max-width: 360px) {
                .aim-bride-name { font-size: 20px; }
                .aim-title { font-size: 9px; }
            }

            @media (prefers-reduced-motion: reduce) {
                *, *::before, *::after {
                    animation-duration: 0.01ms !important;
                    animation-iteration-count: 1 !important;
                }
            }
        </style>
